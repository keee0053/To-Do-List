<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>To Do List</h1>
    <div>
        <table>
            <caption> タスク一覧</caption>
            <thead>

                    <th class="title">タイトル</th>
                    <th class="time">残り時間</th>
                    <th class="edit">&hellip;</th>
                </tr>
            </thead>
            <tbody id="task-list">


            </tbody>
        </table>
    </div>
    <button
        type="button" id="add-button"
        >+</button><script type="module" src="script.js?v=firestore-20260527"></script>
